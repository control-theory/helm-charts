name: Release Charts

on:
  push:
    branches:
      - main
      - stage
  workflow_dispatch:
    inputs:
      version:
        description: 'Chart version override (e.g., 0.2.9-stage.1). Leave empty for auto.'
        required: false
        type: string

jobs:
  release:
    # depending on default permission settings for your org (contents being read-only or read-write for workloads), you will have to add permissions
    # see: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set stage versions (auto from run_number)
        if: github.ref == 'refs/heads/stage' && inputs.version == ''
        run: |
          for chart in charts/*/Chart.yaml; do
            BASE=$(grep '^version:' "$chart" | awk '{print $2}')
            VERSION="${BASE}-stage.${{ github.run_number }}"
            echo "Setting $chart to $VERSION"
            sed -i "s/^version:.*/version: $VERSION/" "$chart"
            cat "$chart"
          done

      - name: Override chart versions (manual)
        if: inputs.version != ''
        run: |
          VERSION="${{ inputs.version }}"
          echo "Setting all chart versions to $VERSION"
          for chart in charts/*/Chart.yaml; do
            sed -i "s/^version:.*/version: $VERSION/" "$chart"
            cat "$chart"
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
